<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <!-- Header -->
        <h2 class="text-white text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-slate-400 mb-8">Enter your details to access your account.</p>

        <!-- Form -->
        <form class="space-y-6">
            <div>
                <label class="text-slate-300 block mb-2 text-sm">Email Address</label>
                <input type="email" class="w-full bg-slate-900 text-white rounded-lg px-4 py-3 border border-slate-700 focus:border-blue-500 focus:outline-none transition" placeholder="name@example.com">
            </div>

            <div>
                <label class="text-slate-300 block mb-2 text-sm">Password</label>
                <input type="password" class="w-full bg-slate-900 text-white rounded-lg px-4 py-3 border border-slate-700 focus:border-blue-500 focus:outline-none transition" placeholder="••••••••">
            </div>

            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center text-slate-400">
                    <input type="checkbox" class="mr-2 bg-slate-900 border-slate-700"> Remember me
                </label>
                <a href="#" class="text-blue-400 hover:underline">Forgot password?</a>
            </div>

            <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg shadow-blue-900/20">
                Sign In
            </button>
        </form>

        <!-- Social Login -->
        <div class="mt-8 text-center text-slate-500 text-sm">Or continue with</div>
        <div class="flex gap-4 mt-4">
            <button class="w-full py-2 border border-slate-700 rounded-lg text-slate-300 hover:bg-slate-700 transition"><i class="fab fa-google"></i> Google</button>
            <button class="w-full py-2 border border-slate-700 rounded-lg text-slate-300 hover:bg-slate-700 transition"><i class="fab fa-github"></i> GitHub</button>
        </div>
    </div>

</body>
</html>
